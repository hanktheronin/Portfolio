    <header class="site-header">

      <section class="page-intro">
        <h1>Photo Portfolio</h1>

      <section class="gallery-grid" aria-label="Photo gallery categories">
        <article class="gallery-item">
          <img src="https://picsum.photos/seed/beach/900/1100" alt="Beach photo placeholder" loading="lazy" />
          <h2>Beach</h2>
        </article>
        <article class="gallery-item">
          <img src="https://picsum.photos/seed/concert/900/1100" alt="Concert photo placeholder" loading="lazy" />

        </article>
        <article class="gallery-item">
          <img src="https://picsum.photos/seed/fashion/900/1100" alt="Fashion photo placeholder" loading="lazy" />

        </article>
        <article class="gallery-item">
          <img src="https://picsum.photos/seed/outdoors/900/1100" alt="Outdoors photo placeholder" loading="lazy" />

        </article>
        <article class="gallery-item">
          <img src="https://picsum.photos/seed/product/900/1100" alt="Product photo placeholder" loading="lazy" />
